<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>Iowa Dye Tournament</title>
</head>
<body>
    <h1>Iowa Dye Tournament</h1>
    <div id="teams">
        <h2>Teams</h2>
        <ul id="team-list"></ul>
        <input type="text" id="team-input" placeholder="Add Team">
        <button id="add-team">Add Team</button>
        <button id="save-teams">Save Teams</button>
    </div>
    <div id="bracket">
        <h2>Bracket</h2>
        <div id="bracket-container"></div>
    </div>
    <script>
        // Array to hold teams
        let teams = [];
        const teamInput = document.getElementById('team-input');
        const teamList = document.getElementById('team-list');
        const bracketContainer = document.getElementById('bracket-container');

        // Load teams from localStorage
        const loadTeams = () => {
            const storedTeams = JSON.parse(localStorage.getItem('teams')) || [];
            teams = storedTeams;
            teams.forEach(team => {
                addTeamToList(team);
            });
            renderBracket();
        };

        // Add team to list
        const addTeamToList = (team) => {
            const li = document.createElement('li');
            li.textContent = team;
            teamList.appendChild(li);
        };

        // Add team button
        document.getElementById('add-team').addEventListener('click', () => {
            const teamName = teamInput.value;
            if (teamName) {
                teams.push(teamName);
                addTeamToList(teamName);
                teamInput.value = '';
                renderBracket();
            }
        });

        // Save teams button
        document.getElementById('save-teams').addEventListener('click', () => {
            localStorage.setItem('teams', JSON.stringify(teams));
            alert('Teams saved!');
        });

        // Render bracket
        const renderBracket = () => {
            // Clear previous bracket
            bracketContainer.innerHTML = '';
            // Code to render bracket based on teams
            // This can be a complex function depending on bracket requirements
        };

        // Load teams on page load
        window.onload = loadTeams;
    </script>
</body>
</html>
