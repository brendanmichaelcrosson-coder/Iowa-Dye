<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <link rel=\"manifest\" href=\"manifest.json\">\n    <title>Bracket Tournament</title>\n    <script src=\"https://cdn.jsdelivr.net/npm/@supabase/supabase-js\"></script>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        h1 { text-align: center; }\n        .bracket { display: flex; flex-direction: column; align-items: center; }\n    </style>\n</head>\n<body>\n    <h1>Welcome to the Bracket Tournament App!</h1>\n    <div class=\"bracket\">\n        <div id=\"bracket-container\"></div>\n    </div>\n    <script>\n        const supabaseUrl = 'https://your-supabase-url';\n        const supabaseKey = 'your-public-anon-key';\n        const supabase = supabase.createClient(supabaseUrl, supabaseKey);\n\n        async function fetchTournamentData() {\n            const { data, error } = await supabase.from('tournaments').select('*');\n            if (error) { console.error('Error fetching tournament data:', error); return; }\n            console.log('Tournament Data:', data);\n            renderBracket(data);\n        }\n\n        function renderBracket(data) {\n            const container = document.getElementById('bracket-container');\n            // Example rendering brackets from data\n            data.forEach(tournament => {\n                const div = document.createElement('div');\n                div.textContent = tournament.name;\n                container.appendChild(div);\n            });\n        }\n\n        // Fetch tournament data on load\n        fetchTournamentData();\n    </script>\n    <script>\n        if ('serviceWorker' in navigator) {\n            navigator.serviceWorker.register('service-worker.js')\n                .then(() => console.log('Service Worker Registered'))\n                .catch(error => console.error('Service Worker Registration Failed:', error));\n        }\n    </script>\n</body>\n</html>
